<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatify - Premium Messaging</title>
  <!-- Tailwind CSS via CDN for rapid styling to match the React version -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      background-color: #121212;
      color: #f5f5f0;
      font-family: 'Inter', sans-serif;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .mobile-mockup {
      width: 100%;
      height: 100%;
      max-width: 430px;
      max-height: 932px;
      background-color: #121212;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    @media (min-width: 431px) {
      .mobile-mockup {
        border-radius: 40px;
        border: 8px solid #2a2a2a;
        height: 90vh;
      }
    }

    /* Glassmorphism Utilities */
    .glass-panel {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-nav {
      background: rgba(18, 18, 18, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .glass-bottom-bar {
      background: rgba(18, 18, 18, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .glass-bubble-sent {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(212, 175, 55, 0.05) 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 175, 55, 0.2);
      color: #f5f5f0;
    }

    .glass-bubble-received {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.04);
      color: #e0e0e0;
    }

    .glass-input-area {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
    }

    /* Animations */
    @keyframes splash-pulse {
      0% { transform: scale(0.95); opacity: 0; filter: drop-shadow(0 0 0 rgba(212, 175, 55, 0)); }
      50% { opacity: 1; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.5)); }
      100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
    }
    .animate-splash { animation: splash-pulse 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fade-in 0.3s forwards; }

    @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slide-up 0.3s forwards; }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .text-gold { color: #D4AF37; }
    .bg-gold { background-color: #D4AF37; }
    .text-subtle { color: #a0a0a0; }
    .gold-glow { box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }

    /* Views */
    .view { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; }
    .view.active { display: flex; animation: fade-in 0.3s ease forwards; }

    /* Typing Dots */
    .typing-dot {
      animation: typing 1.4s infinite ease-in-out both;
      background-color: #D4AF37;
    }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="mobile-mockup">
    
    <!-- Splash Screen -->
    <div id="splash-view" class="view active" style="background: linear-gradient(180deg, #121212 0%, #0a0a0a 100%); align-items: center; justify-content: center;">
      <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-yellow-600/10 rounded-full blur-[80px]"></div>
      <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-[#D4AF37]/5 rounded-full blur-[80px]"></div>
      <div class="relative z-10 flex flex-col items-center animate-splash">
        <div class="w-24 h-24 mb-6 rounded-3xl glass-panel flex items-center justify-center gold-glow">
          <i data-lucide="message-square" class="text-gold w-12 h-12"></i>
        </div>
        <h1 class="text-4xl font-bold tracking-tight">Chat<span class="text-gold">ify</span></h1>
        <p class="mt-4 text-subtle text-sm tracking-widest uppercase opacity-60">Premium Messaging</p>
      </div>
    </div>

    <!-- Home Screen -->
    <div id="home-view" class="view">
      <!-- Top Bar -->
      <div class="glass-nav px-4 pt-12 pb-4 flex flex-col z-20">
        <div class="flex justify-between items-center mb-6">
          <h1 class="text-2xl font-bold tracking-tight">Chat<span class="text-gold">ify</span></h1>
          <div class="flex space-x-4">
            <button class="p-2 rounded-full hover:bg-white/10 transition"><i data-lucide="search" class="w-[22px] h-[22px]"></i></button>
            <button class="p-2 rounded-full hover:bg-white/10 transition"><i data-lucide="camera" class="w-[22px] h-[22px]"></i></button>
            <button class="p-2 rounded-full hover:bg-white/10 transition"><i data-lucide="more-vertical" class="w-[22px] h-[22px]"></i></button>
          </div>
        </div>
        <!-- Tabs -->
        <div class="flex w-full relative">
          <div class="flex w-full justify-between pb-2">
            <button class="flex-1 text-center pb-2 font-medium text-white transition-colors">Chats</button>
            <button class="flex-1 text-center pb-2 font-medium text-subtle transition-colors">Status</button>
            <button class="flex-1 text-center pb-2 font-medium text-subtle transition-colors">Calls</button>
          </div>
          <div class="absolute bottom-0 left-0 w-full h-[2px] bg-white/10 rounded-full">
            <div class="absolute h-full bg-gold rounded-full transition-transform duration-300 ease-out gold-glow" style="width: 33.33%; transform: translateX(0%);"></div>
          </div>
        </div>
      </div>

      <!-- Chat List -->
      <div class="flex-1 overflow-y-auto hide-scrollbar pt-2 pb-24 z-10 px-2" id="chat-list">
        <!-- Rendered via JS -->
      </div>

      <!-- FAB -->
      <button class="absolute bottom-6 right-6 w-14 h-14 rounded-2xl glass-panel flex items-center justify-center z-30 transition-transform active:scale-95 shadow-lg shadow-black/50 group overflow-hidden">
        <div class="absolute inset-0 bg-gold/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
        <i data-lucide="plus" class="text-gold w-7 h-7 z-10"></i>
      </button>
    </div>

    <!-- Chat Screen -->
    <div id="chat-view" class="view z-40 bg-[#121212]">
      <!-- Header -->
      <div class="glass-nav px-2 pt-12 pb-3 flex items-center justify-between z-20">
        <div class="flex items-center">
          <button id="back-btn" class="p-2 mr-1 rounded-full hover:bg-white/10 transition active:scale-90">
            <i data-lucide="arrow-left" class="w-6 h-6"></i>
          </button>
          <div class="flex items-center cursor-pointer">
            <div class="relative">
              <img id="chat-avatar" src="" alt="Profile" class="w-10 h-10 rounded-full object-cover">
              <div id="chat-online" class="hidden absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#121212] rounded-full"></div>
            </div>
            <div class="ml-3">
              <h2 id="chat-name" class="font-semibold text-[16px] leading-tight">Contact</h2>
              <p id="chat-status" class="text-[12px] text-subtle leading-tight">Online</p>
            </div>
          </div>
        </div>
        <div class="flex space-x-1 pr-2">
          <button class="p-2 rounded-full hover:bg-white/10 transition"><i data-lucide="video" class="w-5 h-5"></i></button>
          <button class="p-2 rounded-full hover:bg-white/10 transition"><i data-lucide="phone" class="w-5 h-5"></i></button>
          <button class="p-2 rounded-full hover:bg-white/10 transition"><i data-lucide="more-vertical" class="w-5 h-5"></i></button>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages-container" class="flex-1 overflow-y-auto px-4 pt-4 pb-24 hide-scrollbar flex flex-col space-y-4">
        <div class="flex justify-center mb-2">
          <span class="glass-panel px-3 py-1 rounded-full text-[11px] font-medium text-subtle">Today</span>
        </div>
        <!-- Messages rendered via JS -->
      </div>

      <!-- Input Area -->
      <div class="absolute bottom-0 w-full glass-bottom-bar px-3 py-3 pb-8 sm:pb-3">
        <div class="flex items-end space-x-2">
          <div class="flex-1 flex items-center glass-input-area px-2 py-1 min-h-[44px]">
            <button class="p-2 text-subtle hover:text-gold transition"><i data-lucide="smile" class="w-[22px] h-[22px]"></i></button>
            <input type="text" id="message-input" placeholder="Message..." class="flex-1 bg-transparent border-none focus:outline-none text-white text-[15px] py-2.5 px-1 hide-scrollbar">
            <button class="p-2 text-subtle hover:text-white transition"><i data-lucide="paperclip" class="w-5 h-5 -rotate-45"></i></button>
            <button id="cam-btn" class="p-2 text-subtle hover:text-white transition"><i data-lucide="camera" class="w-5 h-5"></i></button>
          </div>
          <button id="send-btn" class="w-[44px] h-[44px] rounded-full flex items-center justify-center transition-all duration-300 shadow-lg glass-panel text-white active:scale-90">
            <i data-lucide="mic" id="mic-icon" class="w-[22px] h-[22px]"></i>
            <i data-lucide="send" id="send-icon" class="hidden w-[20px] h-[20px] ml-1"></i>
          </button>
        </div>
      </div>
    </div>

  </div>

  <script>
    lucide.createIcons();

    const mockChats = [
      { id: 1, name: 'Elena Rodriguez', avatar: 'https://i.pravatar.cc/150?u=elena', lastMessage: 'The new design looks absolutely stunning! ✨', timestamp: '10:42 AM', unread: 2, online: true },
      { id: 2, name: 'Alex Chen', avatar: 'https://i.pravatar.cc/150?u=alex', lastMessage: 'Are we still on for the meeting at 2 PM?', timestamp: '09:15 AM', unread: 0, online: false, status: 'read' },
      { id: 3, name: 'Design Team', avatar: 'https://i.pravatar.cc/150?u=team', lastMessage: 'David: I uploaded the latest Figma file.', timestamp: 'Yesterday', unread: 5, online: true },
      { id: 4, name: 'Sarah Jenkins', avatar: 'https://i.pravatar.cc/150?u=sarah', lastMessage: 'Thanks for your help! 🙏', timestamp: 'Yesterday', unread: 0, online: false, status: 'delivered' }
    ];

    const mockMessages = [
      { id: 1, text: 'Hey there! How is the new design coming along?', sender: 'them', time: '10:30 AM' },
      { id: 2, text: 'I just finished the first draft of the UI.', sender: 'me', time: '10:35 AM', status: 'read' },
      { id: 3, text: 'The new design looks absolutely stunning! ✨', sender: 'them', time: '10:42 AM' }
    ];

    // Views
    const splashView = document.getElementById('splash-view');
    const homeView = document.getElementById('home-view');
    const chatView = document.getElementById('chat-view');

    // Simulate Splash
    setTimeout(() => {
      splashView.classList.remove('active');
      homeView.classList.add('active');
      renderChatList();
    }, 2500);

    // Render Chat List
    function renderChatList() {
      const container = document.getElementById('chat-list');
      container.innerHTML = '';
      mockChats.forEach((chat, i) => {
        const div = document.createElement('div');
        div.className = `animate-slide-up flex items-center p-3 mb-1 mx-2 rounded-2xl transition-all duration-200 active:scale-[0.98] active:bg-white/5 hover:bg-white/5 cursor-pointer`;
        div.style.animationDelay = `${i * 0.1}s`;
        div.innerHTML = `
          <div class="relative">
            <img src="${chat.avatar}" class="w-14 h-14 rounded-full object-cover border border-white/10">
            ${chat.online ? '<div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-500 border-2 border-[#121212] rounded-full"></div>' : ''}
          </div>
          <div class="ml-4 flex-1 overflow-hidden">
            <div class="flex justify-between items-center mb-1">
              <h3 class="font-semibold text-white text-[16px] truncate">${chat.name}</h3>
              <span class="text-[12px] font-medium ${chat.unread > 0 ? 'text-gold' : 'text-subtle'}">${chat.timestamp}</span>
            </div>
            <div class="flex justify-between items-center">
              <div class="flex items-center flex-1 overflow-hidden">
                <p class="text-[14px] truncate ${chat.unread > 0 ? 'text-white font-medium' : 'text-subtle'}">${chat.lastMessage}</p>
              </div>
              ${chat.unread > 0 ? `<div class="ml-2 min-w-[20px] h-5 rounded-full bg-gold flex items-center justify-center px-1.5 shadow-[0_0_10px_rgba(212,175,55,0.4)]"><span class="text-[11px] font-bold text-black">${chat.unread}</span></div>` : ''}
            </div>
          </div>
        `;
        div.onclick = () => openChat(chat);
        container.appendChild(div);
      });
      lucide.createIcons();
    }

    // Chat logic
    let activeChat = null;
    let currentMessages = [...mockMessages];

    function openChat(chat) {
      activeChat = chat;
      homeView.classList.remove('active');
      chatView.classList.add('active');
      
      document.getElementById('chat-name').innerText = chat.name;
      document.getElementById('chat-avatar').src = chat.avatar;
      document.getElementById('chat-online').style.display = chat.online ? 'block' : 'none';
      document.getElementById('chat-status').innerText = chat.online ? 'Online' : 'last seen recently';
      
      renderMessages();
    }

    document.getElementById('back-btn').onclick = () => {
      chatView.classList.remove('active');
      homeView.classList.add('active');
      activeChat = null;
    };

    function renderMessages() {
      const container = document.getElementById('messages-container');
      // Keep only the "Today" label
      container.innerHTML = `<div class="flex justify-center mb-2"><span class="glass-panel px-3 py-1 rounded-full text-[11px] font-medium text-subtle">Today</span></div>`;
      
      currentMessages.forEach((msg, i) => {
        const isMe = msg.sender === 'me';
        const div = document.createElement('div');
        div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} animate-slide-up`;
        div.style.animationDelay = `${i * 0.05}s`;
        div.innerHTML = `
          <div class="max-w-[75%] px-4 py-2.5 rounded-2xl shadow-sm ${isMe ? 'glass-bubble-sent rounded-tr-sm' : 'glass-bubble-received rounded-tl-sm'}">
            <p class="text-[15px] leading-snug">${msg.text}</p>
          </div>
          <div class="flex items-center mt-1 space-x-1 px-1">
            <span class="text-[10px] text-subtle">${msg.time}</span>
          </div>
        `;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
      lucide.createIcons();
    }

    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const micIcon = document.getElementById('mic-icon');
    const sendIcon = document.getElementById('send-icon');
    const camBtn = document.getElementById('cam-btn');

    input.addEventListener('input', () => {
      if (input.value.trim().length > 0) {
        sendBtn.classList.remove('glass-panel', 'text-white');
        sendBtn.classList.add('bg-gold', 'text-[#121212]', 'shadow-[0_0_15px_rgba(212,175,55,0.4)]');
        micIcon.classList.add('hidden');
        sendIcon.classList.remove('hidden');
        camBtn.classList.add('hidden');
      } else {
        sendBtn.classList.add('glass-panel', 'text-white');
        sendBtn.classList.remove('bg-gold', 'text-[#121212]', 'shadow-[0_0_15px_rgba(212,175,55,0.4)]');
        micIcon.classList.remove('hidden');
        sendIcon.classList.add('hidden');
        camBtn.classList.remove('hidden');
      }
    });

    sendBtn.onclick = () => {
      if (input.value.trim().length === 0) return;
      const text = input.value.trim();
      input.value = '';
      input.dispatchEvent(new Event('input')); // trigger UI reset
      
      currentMessages.push({
        id: Date.now(),
        text: text,
        sender: 'me',
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      });
      renderMessages();

      // Simulate typing reply
      setTimeout(() => {
        document.getElementById('chat-status').innerHTML = '<span class="text-gold">typing...</span>';
        
        // Add typing indicator
        const container = document.getElementById('messages-container');
        const typingDiv = document.createElement('div');
        typingDiv.id = 'typing-indicator';
        typingDiv.className = 'flex items-start animate-fade-in';
        typingDiv.innerHTML = `
          <div class="glass-bubble-received px-4 py-3 rounded-2xl rounded-tl-sm flex space-x-1 items-center">
            <div class="w-1.5 h-1.5 rounded-full typing-dot"></div>
            <div class="w-1.5 h-1.5 rounded-full typing-dot"></div>
            <div class="w-1.5 h-1.5 rounded-full typing-dot"></div>
          </div>
        `;
        container.appendChild(typingDiv);
        container.scrollTop = container.scrollHeight;

        setTimeout(() => {
          document.getElementById('typing-indicator').remove();
          document.getElementById('chat-status').innerText = activeChat.online ? 'Online' : 'last seen recently';
          
          currentMessages.push({
            id: Date.now(),
            text: 'That sounds amazing! 🚀',
            sender: 'them',
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          });
          renderMessages();
        }, 2500);

      }, 500);
    };

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });

  </script>
</body>
</html>
